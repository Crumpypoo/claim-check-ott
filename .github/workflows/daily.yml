name: Check Otta Claims

on:
  schedule:
  - cron: '0 */2 * * *'
  workflow_dispatch:          # lets you also trigger it manually from GitHub

jobs:
  check-claims:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run claim checker
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python check_claims.py

      - name: Commit updated snapshot and log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json data/changes.md
          git diff --cached --quiet || git commit -m "chore: claim snapshot $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
